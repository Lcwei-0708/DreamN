name: Testing Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    
    services:
      mariadb:
        image: mariadb:11.3
        env:
          MARIADB_ROOT_PASSWORD: testpassword
          MARIADB_DATABASE: test_db
          MARIADB_USER: test_user
          MARIADB_PASSWORD: test_password
        ports:
          - 3306:3306
        options: --health-cmd="mariadb-admin --user=test_user --password=test_password --host=localhost ping" --health-interval=10s --health-timeout=5s --health-retries=5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3
      
      influxdb:
        image: influxdb:2.7-alpine
        env:
          DOCKER_INFLUXDB_INIT_MODE: setup
          DOCKER_INFLUXDB_INIT_USERNAME: admin
          DOCKER_INFLUXDB_INIT_PASSWORD: adminpassword
          DOCKER_INFLUXDB_INIT_ORG: test-org
          DOCKER_INFLUXDB_INIT_BUCKET: test-bucket
          DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: test-token
        ports:
          - 8086:8086
        options: --health-cmd="curl -f http://localhost:8086/health" --health-interval=10s --health-timeout=5s --health-retries=3

    env:
      # Database settings
      DATABASE_URL: mysql+pymysql://test_user:test_password@127.0.0.1:3306/test_db
      DATABASE_URL_TEST: mysql+pymysql://test_user:test_password@127.0.0.1:3306/test_db
      
      # Redis settings
      REDIS_URL: redis://127.0.0.1:6379/0
      
      # JWT settings
      SECRET_KEY: test-secret-key-for-ci-cd-pipeline
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      
      # Logging settings
      LOG_LEVEL: WARNING
      
      # Other settings
      DEBUG: False
      FAIL_LIMIT: 10
      FAIL_WINDOW: 600
      BLOCK_TIME: 1800
      
      # Keycloak settings (mocked for testing)
      KEYCLOAK_SERVER_URL: https://test-keycloak.example.com
      KEYCLOAK_REALM: test-realm
      KEYCLOAK_CLIENT: test-client
      KEYCLOAK_ADMIN_CLIENT: test-admin-client
      KEYCLOAK_ADMIN_CLIENT_SECRET: test-admin-secret
      KEYCLOAK_VERIFY: False
      KEYCLOAK_SUPER_ROLE: tsadmin
      
      # Web push settings (mocked for testing)
      VAPID_PUBLIC_KEY: test-public-key
      VAPID_PRIVATE_KEY: test-private-key
      VAPID_EMAIL: test@example.com
      
      # InfluxDB settings
      INFLUXDB_URL: http://127.0.0.1:8086
      INFLUXDB_TOKEN: test-token
      INFLUXDB_ORG: test-org
      INFLUXDB_BUCKET: test-bucket
      INFLUXDB_TIMEOUT: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install Redis CLI
      run: |
        sudo apt-get update
        sudo apt-get install -y redis-tools

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Wait for services to be ready
      run: |
        # Wait for MariaDB
        timeout 60 bash -c 'until mysqladmin ping -h 127.0.0.1 -P 3306 -u root -ptestpassword --silent; do sleep 2; done'
        # Wait for Redis
        timeout 60 bash -c 'until redis-cli -h 127.0.0.1 -p 6379 ping; do sleep 2; done'
        # Wait for InfluxDB
        timeout 60 bash -c 'until curl -f http://127.0.0.1:8086/health; do sleep 2; done'

    - name: Run database migrations
      working-directory: ./backend
      run: |
        # Run migrations if they exist
        if [ -d "migrations" ]; then
          alembic upgrade head || echo "No migrations to run"
        fi

    - name: Run tests with coverage
      working-directory: ./backend
      run: |
        # Run tests with coverage
        pytest --cov=api --cov=core --cov=extensions --cov=middleware --cov=models --cov=schedule --cov=utils --cov=websocket --cov-report=xml --cov-report=html --cov-report=term-missing

    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      if: always()
      with:
        file: ./backend/coverage.xml
        flags: backend
        name: backend-coverage
        fail_ci_if_error: false

    - name: Upload coverage HTML report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-html
        path: backend/htmlcov/

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          backend/coverage.xml
          backend/.coverage